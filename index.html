<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="logo.png">
  <meta name="description" content="Official portfolio of Ali Balighi. Explore original works in electronic music, contemporary music, and electroacoustic music. Featuring articles, scores, and research on animated notation and computer music.">
  <meta name="keywords" content="electronic music, contemporary music, electroacoustic music, computer music, articles, animated notation, Ali Balighi, composer, sound art">
  <meta name="author" content="Ali Balighi">
  <title>Ali Balighi - Composer | Electronic, Electroacoustic & Contemporary Music</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Space+Mono&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-color: #08080A; /* Deep Charcoal / Off-black */
      --text-main: #F4F0EB; /* Bone white */
      --text-dim: #888888;
      --accent-color: #ff0000; /* Red */
    }

    body {
      margin: 0;
      overflow: hidden;
      background-color: var(--bg-color);
    }
    
    canvas { display: block; }

    /* --- Digital Grain (Noise Overlay) --- */
    body::after {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      opacity: 0.04; /* Very subtle texture */
      pointer-events: none;
      z-index: 9999;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }

    /* --- FULL-WIDTH CENTERED CONTAINER --- */
    #center-container {
      position: absolute;
      top: 50%;
      left: 0;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 35px; /* Spacious layout */
      z-index: 100;
      
      /* Liminal Blur: Semi-transparent dark band */
      background: rgba(8, 8, 10, 0.65); 
      padding: 50px 0; 
      width: 100%;
      backdrop-filter: blur(10px); /* Frosted glass effect */
      -webkit-backdrop-filter: blur(10px);
      border-top: 1px solid rgba(244, 240, 235, 0.05);
      border-bottom: 1px solid rgba(244, 240, 235, 0.05);
      
      pointer-events: none; 
    }

    .identity {
      text-align: center;
      pointer-events: auto; 
    }

    .name-text { 
      font-family: 'Cormorant Garamond', serif; 
      font-size: 80px; 
      font-weight: 400;
      letter-spacing: 4px;
      color: var(--text-main);
      margin: 0;
      line-height: 1;
    }

    .subtitle-text { 
      font-family: 'Cormorant Garamond', serif; 
      font-size: 14px; 
      letter-spacing: 2px; 
      color: var(--text-dim);
      /* text-transform: uppercase; ---> REMOVED THIS LINE */
      margin-top: 15px;
    }

    .menu {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1px;
      max-width: 90%;
      pointer-events: auto; 
    }

    /* The Technical Anchor: Menu Links */
    .highlight {
      font-family: 'Cormorant Garamond', serif; 
      color: var(--text-dim);
      padding: 6px 12px;
      text-decoration: none;
      font-size: 16px;
      letter-spacing: 2px;
      border: 1px solid transparent;
      transition: all 0.3s ease;
      cursor: pointer;
      user-select: none;
      text-transform: uppercase;
    }

    /* The Rupture: Hover state */
    .highlight:hover {
      color: var(--accent-color);
      border-color: rgba(255, 0, 0, 0.3);
      text-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
      background: rgba(255, 0, 0, 0.05);
    }

    #pause-container {
      position: absolute;
      bottom: 30px;
      right: 30px;
      z-index: 101;
    }

    .red-highlight {
      border: 1px solid rgba(244, 240, 235, 0.2);
      color: var(--text-dim);
    }

    .red-highlight:hover {
      border-color: var(--text-main);
      color: var(--text-main);
      background: rgba(255, 255, 255, 0.05);
      text-shadow: none;
    }

    @media (max-width: 768px) {
      #center-container {
        padding: 35px 0;
        gap: 25px;
      }
      .name-text { font-size: 42px; letter-spacing: 2px; } 
      .subtitle-text { font-size: 11px; letter-spacing: 1px; padding: 0 15px; line-height: 1.6; }
      .menu { gap: 8px; }
      .highlight { font-size: 10px; padding: 5px 8px; }
      #pause-container { bottom: 20px; right: 20px; }
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

  <div id="center-container">
    
    <div class="identity">
      <h1 class="name-text">Ali Balighi</h1>
      <div class="subtitle-text">Composer & scholar — electroacoustic, contemporary, and cross-cultural music</div>
    </div>

    <nav class="menu">
        <a href="index.html" class="highlight">HOME</a>
        <a href="about.html" class="highlight">ABOUT</a>
        <a href="music.html" class="highlight">MUSIC</a>
        <a href="scores.html" class="highlight">SCORES</a>
        <a href="articles.html" class="highlight">ARTICLES</a>
        <a href="books.html" class="highlight">BOOKS</a>
        <a href="news.html" class="highlight">NEWS</a>
        <a href="https://github.com/alib65" target="_blank" class="highlight">CODE</a>
        <a href="https://alibalighi.bandcamp.com/" target="_blank" class="highlight">BANDCAMP</a>
        <a href="https://www.youtube.com/@AliBalighi" target="_blank" class="highlight">YOUTUBE</a>
        <a href="https://electronicnights.github.io" target="_blank" class="highlight">ELECTRONIC NIGHTS</a>
        <a href="contact.html" class="highlight">CONTACT</a>
    </nav>
    
  </div>

  <div id="pause-container">
    <div id="pause-btn" class="highlight red-highlight">PAUSE ANIMATION</div>
  </div>

  <script>
    // --- CONFIGURATION ---
    const PARTICLE_COUNT = 50000;
    const SHAPE_TIME = 20000;

    // Physics settings
    const ATTRACTION = 0.03;
    const DAMPING = 0.96;
    const NOISE_SCALE = 0.8;

    let scene, camera, renderer, system;
    let positions, velocities, targets;

    let currentShape = -1;
    let shapeTimer = Date.now();

    // --- GLOBAL PAUSE LOGIC ---
    let isPaused = localStorage.getItem('siteAnimationPaused') === 'true';

    const shapes = [];

    init();
    animate();

    function init() {
      scene = new THREE.Scene();
      // Updated fog to match the new deep charcoal background
      scene.fog = new THREE.FogExp2(0x08080A, 0.001);

      camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 4000);

      renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance", alpha: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(window.devicePixelRatio);
      document.body.appendChild(renderer.domElement);

      positions = new Float32Array(PARTICLE_COUNT * 3);
      velocities = new Float32Array(PARTICLE_COUNT * 3);
      targets = new Float32Array(PARTICLE_COUNT * 3);

      for (let i = 0; i < PARTICLE_COUNT * 3; i++) {
        positions[i] = (Math.random() - 0.5) * 1000;
        velocities[i] = (Math.random() - 0.5) * 2;
        targets[i] = positions[i];
      }

      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

      const material = new THREE.PointsMaterial({
        color: 0xF4F0EB, // Changed from pure white to bone white
        size: 0.8,
        transparent: true,
        opacity: 0.6, // Slightly softer particles
        blending: THREE.AdditiveBlending,
        sizeAttenuation: true
      });

      system = new THREE.Points(geometry, material);
      scene.add(system);

      createShapes();
      changeShape();
      shapeTimer = Date.now();

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      const pauseBtn = document.getElementById('pause-btn');
      if (isPaused) pauseBtn.innerText = "RESUME ANIMATION";

      pauseBtn.addEventListener('click', () => {
        isPaused = !isPaused;
        localStorage.setItem('siteAnimationPaused', isPaused);
        pauseBtn.innerText = isPaused ? "RESUME ANIMATION" : "PAUSE ANIMATION";
      });
    }

    function createShapes() {
      const set = (arr, i, x, y, z) => {
        arr[i * 3] = x;
        arr[i * 3 + 1] = y;
        arr[i * 3 + 2] = z;
      };

      const TAU = Math.PI * 2;
      const Z_THICKNESS = 10;
      const zJ = () => (Math.random() - 0.5) * Z_THICKNESS;

      const lerp = (a, b, t) => a + (b - a) * t;
      const rot = (x, y, a) => {
        const c = Math.cos(a), s = Math.sin(a);
        return [x * c - y * s, x * s + y * c];
      };
      const pick = (arr) => arr[(Math.random() * arr.length) | 0];

      shapes.length = 0;

      // 01. Flower-of-life arc field
      shapes.push((() => {
        const spacing = 64;
        const r0 = 22;
        const h = spacing * Math.sqrt(3) / 2;
        const centers = [];
        const R = 320;
        for (let j = -8; j <= 8; j++) {
          for (let i = -8; i <= 8; i++) {
            const cx = spacing * (i + j * 0.5);
            const cy = h * j;
            if (cx * cx + cy * cy <= R * R) centers.push([cx, cy]);
          }
        }
        return () => {
          const arr = new Float32Array(PARTICLE_COUNT * 3);
          for (let i = 0; i < PARTICLE_COUNT; i++) {
            const [cx, cy] = pick(centers);
            const a = Math.random() * TAU;
            const ring = Math.random() < 0.25 ? 2 : 1;
            const rr = r0 * ring;
            set(arr, i, cx + rr * Math.cos(a), cy + rr * Math.sin(a), zJ());
          }
          return arr;
        };
      })());

      // 02. Square lattice
      shapes.push((() => {
        const cell = 70;
        const half = 10;
        const side = 40;
        const centers = [];
        for (let y = -half; y <= half; y++) {
          for (let x = -half; x <= half; x++) centers.push([x * cell, y * cell]);
        }
        const edgePoint = (s, e) => {
          const u = (Math.random() - 0.5) * s;
          if (e === 0) return [ s / 2, u];
          if (e === 1) return [ u,  s / 2];
          if (e === 2) return [-s / 2, u];
          return [u, -s / 2];
        };
        return () => {
          const arr = new Float32Array(PARTICLE_COUNT * 3);
          for (let i = 0; i < PARTICLE_COUNT; i++) {
            const [cx, cy] = pick(centers);
            const a = Math.random() < 0.5 ? 0 : Math.PI / 4;
            const e = (Math.random() * 4) | 0;
            const [lx, ly] = edgePoint(side, e);
            const [rx, ry] = rot(lx, ly, a);
            set(arr, i, cx + rx, cy + ry, zJ());
          }
          return arr;
        };
      })());

      // 03. Triangular grid
      shapes.push((() => {
        const s = 62;
        const h = s * Math.sqrt(3) / 2;
        const half = 10;
        const nodes = [];
        for (let j = -half; j <= half; j++) {
          for (let i = -half; i <= half; i++) nodes.push([i * s + (j & 1 ? s / 2 : 0), j * h]);
        }
        const tri = (up) => {
          const a = [0, 0];
          const b = [s, 0];
          const c = [s / 2, up ? h : -h];
          return [a, b, c];
        };
        const TUP = tri(true);
        const TDN = tri(false);
        return () => {
          const arr = new Float32Array(PARTICLE_COUNT * 3);
          for (let i = 0; i < PARTICLE_COUNT; i++) {
            const [ox, oy] = pick(nodes);
            const verts = Math.random() < 0.5 ? TUP : TDN;
            const e = (Math.random() * 3) | 0;
            const p0 = verts[e];
            const p1 = verts[(e + 1) % 3];
            const t = Math.random();
            set(arr, i, ox + lerp(p0[0], p1[0], t), oy + lerp(p0[1], p1[1], t), zJ());
          }
          return arr;
        };
      })());

      // 04. Honeycomb
      shapes.push((() => {
        const spacing = 74;
        const h = spacing * Math.sqrt(3) / 2;
        const half = 8;
        const centers = [];
        for (let j = -half; j <= half; j++) {
          for (let i = -half; i <= half; i++) centers.push([spacing * (i + j * 0.5), h * j]);
        }
        const R = 26;
        const hex = [];
        for (let k = 0; k < 6; k++) {
          const a = (k / 6) * TAU;
          hex.push([R * Math.cos(a), R * Math.sin(a)]);
        }
        return () => {
          const arr = new Float32Array(PARTICLE_COUNT * 3);
          for (let i = 0; i < PARTICLE_COUNT; i++) {
            const [cx, cy] = pick(centers);
            const e = (Math.random() * 6) | 0;
            const p0 = hex[e];
            const p1 = hex[(e + 1) % 6];
            const t = Math.random();
            set(arr, i, cx + lerp(p0[0], p1[0], t), cy + lerp(p0[1], p1[1], t), zJ());
          }
          return arr;
        };
      })());

      // 05. Octagon frames
      shapes.push((() => {
        const cell = 92;
        const half = 8;
        const centers = [];
        for (let y = -half; y <= half; y++) {
          for (let x = -half; x <= half; x++) centers.push([x * cell, y * cell]);
        }
        const R = 30;
        const oct = [];
        for (let k = 0; k < 8; k++) {
          const a = (k / 8) * TAU + Math.PI / 8;
          oct.push([R * Math.cos(a), R * Math.sin(a)]);
        }
        return () => {
          const arr = new Float32Array(PARTICLE_COUNT * 3);
          for (let i = 0; i < PARTICLE_COUNT; i++) {
            const [cx, cy] = pick(centers);
            const e = (Math.random() * 8) | 0;
            const p0 = oct[e];
            const p1 = oct[(e + 1) % 8];
            const t = Math.random();
            set(arr, i, cx + lerp(p0[0], p1[0], t), cy + lerp(p0[1], p1[1], t), zJ());
          }
          return arr;
        };
      })());

      // 06. Eight-point star
      shapes.push((() => {
        const cell = 92;
        const half = 8;
        const centers = [];
        for (let y = -half; y <= half; y++) {
          for (let x = -half; x <= half; x++) centers.push([x * cell, y * cell]);
        }
        const R = 34, r = 16;
        const star = [];
        for (let k = 0; k < 16; k++) {
          const a = (k / 16) * TAU;
          const rr = (k & 1) === 0 ? R : r;
          star.push([rr * Math.cos(a), rr * Math.sin(a)]);
        }
        return () => {
          const arr = new Float32Array(PARTICLE_COUNT * 3);
          for (let i = 0; i < PARTICLE_COUNT; i++) {
            const [cx, cy] = pick(centers);
            const e = (Math.random() * 16) | 0;
            const p0 = star[e];
            const p1 = star[(e + 1) % 16];
            const t = Math.random();
            set(arr, i, cx + lerp(p0[0], p1[0], t), cy + lerp(p0[1], p1[1], t), zJ());
          }
          return arr;
        };
      })());

      // 07. Dodecagonal rosette field
      shapes.push((() => {
        const cell = 110;
        const half = 7;
        const centers = [];
        for (let y = -half; y <= half; y++) {
          for (let x = -half; x <= half; x++) centers.push([x * cell, y * cell]);
        }
        const R = 46;
        return () => {
          const arr = new Float32Array(PARTICLE_COUNT * 3);
          for (let i = 0; i < PARTICLE_COUNT; i++) {
            const [cx, cy] = pick(centers);
            const a = Math.random() * TAU;
            const rr = R * (0.55 + 0.45 * Math.abs(Math.cos(6 * a)));
            set(arr, i, cx + rr * Math.cos(a), cy + rr * Math.sin(a), zJ());
          }
          return arr;
        };
      })());

      // 08. Interlaced strapwork
      shapes.push((() => {
        const S = 720;
        const A = 22;
        const F = 0.045;
        return () => {
          const arr = new Float32Array(PARTICLE_COUNT * 3);
          for (let i = 0; i < PARTICLE_COUNT; i++) {
            const u = (Math.random() - 0.5) * S;
            const v = (Math.random() - 0.5) * S;
            const x = u + A * Math.sin(v * F);
            const y = v + A * Math.sin(u * F);
            set(arr, i, x, y, zJ());
          }
          return arr;
        };
      })());

      // 09. Rhombille-style diamonds
      shapes.push((() => {
        const cell = 78;
        const half = 8;
        const e1 = [cell, 0];
        const e2 = [cell / 2, cell * Math.sqrt(3) / 2];
        const centers = [];
        for (let j = -half; j <= half; j++) {
          for (let i = -half; i <= half; i++) centers.push([i * e1[0] + j * e2[0], i * e1[1] + j * e2[1]]);
        }
        const w = 46;
        const h = w * Math.sqrt(3) / 2;
        const diamond = [[0, -h], [w, 0], [0, h], [-w, 0]];
        return () => {
          const arr = new Float32Array(PARTICLE_COUNT * 3);
          for (let i = 0; i < PARTICLE_COUNT; i++) {
            const [cx, cy] = pick(centers);
            const ang = ((Math.random() * 3) | 0) * (Math.PI / 3);
            const e = (Math.random() * 4) | 0;
            const p0 = diamond[e];
            const p1 = diamond[(e + 1) % 4];
            const t = Math.random();
            const lx = lerp(p0[0], p1[0], t);
            const ly = lerp(p0[1], p1[1], t);
            const [rx, ry] = rot(lx, ly, ang);
            set(arr, i, cx + rx, cy + ry, zJ());
          }
          return arr;
        };
      })());

      // 10. Tenfold star field
      shapes.push((() => {
        const centers = [];
        for (let i = 0; i < 90; i++) {
          const a = Math.random() * TAU;
          const r = 80 + Math.random() * 260;
          centers.push([r * Math.cos(a), r * Math.sin(a)]);
        }
        const R = 62;
        return () => {
          const arr = new Float32Array(PARTICLE_COUNT * 3);
          for (let i = 0; i < PARTICLE_COUNT; i++) {
            const [cx, cy] = pick(centers);
            const a = Math.random() * TAU;
            const rr = R * (0.35 + 0.65 * Math.abs(Math.cos(5 * a)));
            const m = 0.75 + Math.random() * 0.35;
            set(arr, i, cx + m * rr * Math.cos(a), cy + m * rr * Math.sin(a), zJ());
          }
          return arr;
        };
      })());
    }

    function changeShape() {
      currentShape = (currentShape + 1) % shapes.length;
      const newPos = shapes[currentShape]();

      for (let i = 0; i < PARTICLE_COUNT * 3; i++) targets[i] = newPos[i];

      for (let i = 0; i < PARTICLE_COUNT * 3; i += 3) {
        velocities[i]     += (Math.random() - 0.5) * 5;
        velocities[i + 1] += (Math.random() - 0.5) * 5;
        velocities[i + 2] += (Math.random() - 0.5) * 5;
      }
    }

    function animate() {
      requestAnimationFrame(animate);

      if (isPaused) {
        renderer.render(scene, camera);
        return;
      }

      const time = Date.now() * 0.001;

      for (let i = 0; i < PARTICLE_COUNT * 3; i += 3) {
        const ix = i, iy = i + 1, iz = i + 2;

        const ax = (targets[ix] - positions[ix]) * ATTRACTION;
        const ay = (targets[iy] - positions[iy]) * ATTRACTION;
        const az = (targets[iz] - positions[iz]) * ATTRACTION;

        const swirlX = Math.sin(positions[iy] * 0.01 + time) * NOISE_SCALE;
        const swirlY = Math.cos(positions[iz] * 0.01 + time) * NOISE_SCALE;
        const swirlZ = Math.sin(positions[ix] * 0.01 + time) * NOISE_SCALE;

        velocities[ix] += ax + swirlX;
        velocities[iy] += ay + swirlY;
        velocities[iz] += az + swirlZ;

        velocities[ix] *= DAMPING;
        velocities[iy] *= DAMPING;
        velocities[iz] *= DAMPING;

        positions[ix] += velocities[ix];
        positions[iy] += velocities[iy];
        positions[iz] += velocities[iz];
      }

      system.geometry.attributes.position.needsUpdate = true;

      const camSpeed = 0.5;
      const radius = 180;
      camera.position.x = radius * Math.sin(time * camSpeed);
      camera.position.y = radius * Math.sin(time * camSpeed * 0.6);
      camera.position.z = radius * Math.cos(time * camSpeed * 0.8);

      camera.position.x += (Math.random() - 0.5) * 2;
      camera.position.y += (Math.random() - 0.5) * 2;
      camera.position.z += (Math.random() - 0.5) * 2;

      camera.lookAt(0, 0, 0);
      system.rotation.z = time * 0.1;

      if (Date.now() - shapeTimer > SHAPE_TIME) {
        shapeTimer = Date.now();
        changeShape();
      }

      renderer.render(scene, camera);
    }
  </script>
</body>
