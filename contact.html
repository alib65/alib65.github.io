<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="logo.png">
    <meta name="description" content="Official portfolio of Ali Balighi. Explore original works in electronic music, contemporary music, and electroacoustic music. Featuring articles, scores, and research on animated notation and computer music.">
    <meta name="keywords" content="electronic music, contemporary music, electroacoustic music, computer music, articles, animated notation, Ali Balighi, composer, sound art">
    <meta name="author" content="Ali Balighi">
    <title>Contact - Ali Balighi</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;700&family=Space+Mono&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #000000; /* Simple Pure Black */
            --text-main: #F4F0EB; /* Bone white */
            --text-dim: #cccccc; /* Light gray for readability */
            --text-muted: #888888; /* Muted gray for menu/meta */
            --accent-color: #ff0000; /* Red */
        }

        /* --- CORE STYLES --- */
        body {
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Cormorant Garamond', serif;
            overflow: hidden; /* Prevent scrolling for the simple contact page */
        }

        /* --- UI LAYOUT (Menu & Title) --- */
        #top-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 40px;
            padding-bottom: 20px;
            gap: 25px;
        }

        .menu {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            max-width: 90%;
        }

        .highlight {
            font-family: 'Cormorant Garamond', serif;
            color: var(--text-muted);
            padding: 6px 12px;
            text-decoration: none;
            font-size: 16px;
            letter-spacing: 2px;
            border: 1px solid transparent;
            transition: all 0.3s ease;
            cursor: pointer;
            user-select: none;
            text-transform: uppercase;
        }

        .highlight:hover {
            color: var(--accent-color);
            border-color: rgba(255, 0, 0, 0.3);
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
            background: rgba(255, 0, 0, 0.05);
            transform: scale(1.02);
        }

        /* --- IDENTITY / TITLE STYLES --- */
        .identity {
            text-align: center;
        }

        .name-text { 
            font-size: 54px; 
            color: #ffffff;
            margin: 0;
            line-height: 1;
            letter-spacing: 2px;
            font-weight: 500;
        }
        
        .subtitle-text { 
            font-family: 'Cormorant Garamond', serif;
            font-size: 13px; 
            color: #aaaaaa; 
            margin-top: 12px; 
            letter-spacing: 1px;
        }

        /* --- CONTACT CONTENT STYLES --- */
        #content-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: calc(100vh - 250px); /* Fill remaining space below header */
        }

        .contact-box {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .contact-intro {
            font-size: 22px;
            margin-bottom: 20px;
            font-style: normal;
            color: var(--text-dim);
        }

        .email-link {
            font-family: 'Space Mono', monospace;
            font-size: 20px; 
            color: var(--accent-color); /* Red */
            text-decoration: none;
            padding: 10px 15px;
            transition: all 0.3s ease;
            border-bottom: 1px dashed var(--accent-color);
            letter-spacing: 1px;
        }

        .email-link:hover {
            color: #8b0000; /* Darker red */
            border-bottom-style: solid;
            text-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
            transform: scale(1.05);
        }

        /* --- MOBILE RESPONSIVENESS --- */
        @media (max-width: 768px) {
            #top-container { padding-top: 25px; gap: 20px; }
            
            .highlight { 
                font-size: 10px; 
                padding: 5px 8px; 
            }
            .menu { gap: 8px; }

            .name-text { font-size: 36px; } 
            .subtitle-text { font-size: 10px; line-height: 1.4; padding: 0 15px; }

            .contact-intro { font-size: 18px; }
            .email-link { font-size: 16px; word-break: break-all; }
        }
    </style>
</head>
<body>

    <div id="top-container">
        <nav class="menu">
            <a href="index.html" class="highlight">HOME</a>
            <a href="about.html" class="highlight">ABOUT</a>
            <a href="music.html" class="highlight">MUSIC</a>
            <a href="scores.html" class="highlight">SCORES</a>
            <a href="articles.html" class="highlight">ARTICLES</a>
            <a href="books.html" class="highlight">BOOKS</a>
            <a href="news.html" class="highlight">NEWS</a>
            <a href="https://github.com/alib65" target="_blank" class="highlight">CODE</a>
            <a href="https://alibalighi.bandcamp.com/" target="_blank" class="highlight">BANDCAMP</a>
            <a href="https://www.youtube.com/@AliBalighi" target="_blank" class="highlight">YOUTUBE</a>
            <a href="https://electronicnights.github.io" target="_blank" class="highlight">ELECTRONIC NIGHTS</a>
            <a href="contact.html" class="highlight">CONTACT</a>
        </nav>

        <div class="identity">
            <h1 class="name-text">Ali Balighi</h1>
            <div class="subtitle-text">Composer & scholar — electroacoustic, contemporary, and cross-cultural music</div>
        </div>
    </div>

    <div id="content-wrapper">
        <div class="contact-box">
            <p class="contact-intro">For inquiries, please contact:</p>
            <a href="mailto:alibalighi@gmail.com" class="email-link">alibalighi@gmail.com</a>
        </div>
    </div>

</body>
</html>
